<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Ahmed Hussein</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <div class="dash-layout">
        <aside class="dash-sidebar" id="dash-sidebar">
            <div class="ds-logo-area">
                <div class="ds-logo">DASHBOARD</div>
                <div class="ds-role" id="ds-role-txt">Student Portal</div>
            </div>
            <nav class="ds-nav" id="ds-nav"></nav>
            <button class="sidebar-toggle" id="sidebar-toggle">☰</button>
        </aside>
        <main class="dash-main">
            <div class="dash-panel act" id="dash-overview">
                <div class="dash-toprow">
                    <div>
                        <div class="dash-hello">WELCOME, <span id="dash-name">STUDENT</span></div>
                        <div class="dash-sub">Continue your certification journey</div>
                    </div>
                    <div class="dash-plan-chip">
                        <div class="dpc-lbl">Your Plan</div>
                        <div class="dpc-val" id="dash-plan">FREE</div>
                    </div>
                </div>
                <div class="dash-stats">
                    <div class="dstat">
                        <div class="dstat-ico ico-c"><i class="fas fa-book-open"></i></div>
                        <div class="dstat-num" id="dash-enrolled-n">0</div>
                        <div class="dstat-lbl">Enrolled</div>
                    </div>
                    <div class="dstat">
                        <div class="dstat-ico ico-g"><i class="fas fa-check-circle"></i></div>
                        <div class="dstat-num">0</div>
                        <div class="dstat-lbl">Completed</div>
                    </div>
                    <div class="dstat">
                        <div class="dstat-ico ico-o"><i class="fas fa-certificate"></i></div>
                        <div class="dstat-num">0</div>
                        <div class="dstat-lbl">Certificates</div>
                    </div>
                    <div class="dstat">
                        <div class="dstat-ico ico-p"><i class="fas fa-clock"></i></div>
                        <div class="dstat-num">0h</div>
                        <div class="dstat-lbl">Study Time</div>
                    </div>
                </div>
                <div class="upgrade-banner">
                    <div class="ub-text">
                        <div class="ub-t">UPGRADE TO PREMIUM ⚡</div>
                        <div class="ub-d">Full course access, downloadable labs, and certificates.</div>
                    </div>
                    <button class="btn btn-o" onclick="upgradeNow()"><i class="fas fa-crown"></i> Upgrade Now</button>
                </div>
            </div>
            <!-- Admin Panels -->
            <div class="dash-panel" id="dash-admin-courses">
                <div class="dash-toprow">
                    <div><div class="dash-hello">COURSE <span>MANAGER</span></div></div>
                    <button class="btn btn-c" onclick="openEditCourse(null)"><i class="fas fa-plus"></i> Add Course</button>
                </div>
                <div id="admin-courses-table"></div>
            </div>
            <div class="dash-panel" id="dash-admin-lessons">
                <div class="dash-toprow">
                    <div><div class="dash-hello">LESSON <span>MANAGER</span></div></div>
                    <button class="btn btn-c" onclick="openEditLesson(null)"><i class="fas fa-plus"></i> Add Lesson</button>
                </div>
                <div id="admin-lessons-table"></div>
            </div>
            <!-- Student Panels -->
            <div class="dash-panel" id="dash-my-courses">
                <div class="dash-toprow">
                    <div><div class="dash-hello">MY COURSES</div></div>
                    <button class="btn btn-c" onclick="Router.go('courses')"><i class="fas fa-plus"></i> Browse More</button>
                </div>
                <div class="enrolled-list" id="dash-enr-list"></div>
            </div>
            <div class="dash-panel" id="dash-progress">
                <div class="dash-toprow">
                    <div><div class="dash-hello">PROGRESS <span>TRACKING</span></div></div>
                </div>
                <div id="progress-content"></div>
            </div>
        </main>
    </div>
    <script src="dashboard.js"></script>
</body>
</html>
