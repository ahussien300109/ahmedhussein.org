<!--
  Ahmed Hussein — Brand Logo
  Versions: horizontal (dark) · horizontal (light) · icon-only
  Primary: #00d4ff  |  Dark bg: #020617  |  Alt: #0062cc (light mode)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200">

  <!-- ══════════════════════════════════════════════
       VERSION 1 — HORIZONTAL LOGO (dark background)
       ════════════════════════════════════════════== -->
  <g transform="translate(0,0)">

    <!-- Dark background pill -->
    <rect width="580" height="88" rx="12" fill="#020617"/>

    <!-- ── ICON (60×60, centered in 88px tall bg) ── -->
    <g transform="translate(14,14)">

      <!-- Outer animated-feel ring (static for SVG file) -->
      <circle cx="30" cy="30" r="27" fill="none" stroke="rgba(0,212,255,.35)"
              stroke-width="1" stroke-dasharray="7 4"/>

      <!-- Routing lines: 3 endpoints → central hub -->
      <line x1="30"  y1="11.5" x2="30"  y2="24"   stroke="#00d4ff" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="13"  y1="43"   x2="25"  y2="34.5" stroke="#00d4ff" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="47"  y1="43"   x2="35"  y2="34.5" stroke="#00d4ff" stroke-width="1.8" stroke-linecap="round"/>

      <!-- Central hub: ring + core -->
      <circle cx="30" cy="30" r="6"   fill="none" stroke="#00d4ff" stroke-width="2"/>
      <circle cx="30" cy="30" r="2.5" fill="#00d4ff"/>

      <!-- Endpoint nodes -->
      <circle cx="30"  cy="11.5" r="3.2" fill="#00d4ff"/>
      <circle cx="13"  cy="43"   r="3.2" fill="#00d4ff"/>
      <circle cx="47"  cy="43"   r="3.2" fill="#00d4ff"/>

    </g>

    <!-- Vertical separator -->
    <line x1="90" y1="18" x2="90" y2="70" stroke="rgba(0,212,255,.18)" stroke-width="1"/>

    <!-- Wordmark: AHMED HUSSEIN -->
    <text x="106" y="44"
          font-family="'Orbitron', 'Courier New', monospace"
          font-size="24" font-weight="900" letter-spacing="5"
          fill="#ffffff">AHMED HUSSEIN</text>

    <!-- Tagline -->
    <text x="107" y="64"
          font-family="'Orbitron', 'Courier New', monospace"
          font-size="9" font-weight="500" letter-spacing="4"
          fill="#00d4ff">CISCO CERTIFIED INSTRUCTOR</text>

  </g>


  <!-- ══════════════════════════════════════════════
       VERSION 2 — ICON ONLY  (60×60 standalone)
       ════════════════════════════════════════════== -->
  <g transform="translate(0,108)">

    <!-- Background -->
    <rect width="88" height="88" rx="44" fill="#020617"/>

    <g transform="translate(14,14)">
      <circle cx="30" cy="30" r="27" fill="none" stroke="rgba(0,212,255,.32)"
              stroke-width="1" stroke-dasharray="7 4"/>

      <line x1="30" y1="11.5" x2="30" y2="24"   stroke="#00d4ff" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="13" y1="43"   x2="25" y2="34.5" stroke="#00d4ff" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="47" y1="43"   x2="35" y2="34.5" stroke="#00d4ff" stroke-width="1.8" stroke-linecap="round"/>

      <circle cx="30" cy="30" r="6"   fill="none" stroke="#00d4ff" stroke-width="2"/>
      <circle cx="30" cy="30" r="2.5" fill="#00d4ff"/>

      <circle cx="30" cy="11.5" r="3.2" fill="#00d4ff"/>
      <circle cx="13" cy="43"   r="3.2" fill="#00d4ff"/>
      <circle cx="47" cy="43"   r="3.2" fill="#00d4ff"/>
    </g>

  </g>


  <!-- ══════════════════════════════════════════════
       VERSION 3 — HORIZONTAL LOGO (light background)
       ════════════════════════════════════════════== -->
  <g transform="translate(100,108)">

    <rect width="480" height="88" rx="12" fill="#f5f7fa"/>

    <g transform="translate(14,14)">
      <circle cx="30" cy="30" r="27" fill="none" stroke="rgba(0,98,204,.28)"
              stroke-width="1" stroke-dasharray="7 4"/>

      <line x1="30" y1="11.5" x2="30" y2="24"   stroke="#0062cc" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="13" y1="43"   x2="25" y2="34.5" stroke="#0062cc" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="47" y1="43"   x2="35" y2="34.5" stroke="#0062cc" stroke-width="1.8" stroke-linecap="round"/>

      <circle cx="30" cy="30" r="6"   fill="none" stroke="#0062cc" stroke-width="2"/>
      <circle cx="30" cy="30" r="2.5" fill="#0062cc"/>

      <circle cx="30" cy="11.5" r="3.2" fill="#0062cc"/>
      <circle cx="13" cy="43"   r="3.2" fill="#0062cc"/>
      <circle cx="47" cy="43"   r="3.2" fill="#0062cc"/>
    </g>

    <line x1="90" y1="18" x2="90" y2="70" stroke="rgba(0,98,204,.2)" stroke-width="1"/>

    <text x="106" y="44"
          font-family="'Orbitron', 'Courier New', monospace"
          font-size="24" font-weight="900" letter-spacing="5"
          fill="#0f172a">AHMED HUSSEIN</text>

    <text x="107" y="64"
          font-family="'Orbitron', 'Courier New', monospace"
          font-size="9" font-weight="500" letter-spacing="4"
          fill="#0062cc">CISCO CERTIFIED INSTRUCTOR</text>

  </g>

</svg>
