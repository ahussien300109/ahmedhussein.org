<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCNA Exam Labs | Ahmed Hussein</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script>(function(){var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark');if(t==='light')document.documentElement.setAttribute('data-theme','light');})();</script>
<style>
/* ── DESIGN TOKENS (mirror main site) ── */
:root{
  --c:#00d4ff;--c2:#0099cc;--c3:#005577;
  --o:#ff6a00;--o2:#ff9a40;--g:#00ff88;
  --bg:#030d1a;--bg1:#060f20;--bg2:#080e1c;--bg3:#0c1628;--bg4:#101e38;
  --card:#0a1525;--t:#c8ddf0;--tm:#7a9ab5;--tw:#fff;
  --bdr:rgba(0,212,255,.15);--bdr2:rgba(0,212,255,.3);
  --r:10px;--r2:16px;
}
[data-theme="light"]{
  --c:#0062cc;--c2:#004fa3;--c3:#003d7a;--o:#c94f08;--g:#16a34a;
  --bg:#f5f7fa;--bg1:#eef1f6;--bg2:#e7ecf4;--bg3:#dde4ef;--bg4:#cdd6e6;
  --card:#fff;--t:#1e293b;--tm:#64748b;--tw:#0f172a;
  --bdr:rgba(0,0,0,.07);--bdr2:rgba(0,0,0,.12);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Exo 2',sans-serif;background:var(--bg);color:var(--t);overflow-x:hidden;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--c3);border-radius:4px;}
::selection{background:rgba(0,212,255,.25);color:var(--tw);}

/* ── NAV ── */
#nav{position:fixed;top:0;width:100%;z-index:1000;padding:0 2rem;background:rgba(3,13,26,.96);backdrop-filter:blur(24px);border-bottom:1px solid var(--bdr);}
.nav-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px;}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-text{font-family:'Orbitron',monospace;font-size:.95rem;font-weight:700;color:var(--tw);letter-spacing:1px;}
.logo-text span{color:var(--c);}
.logo-sub{font-size:.55rem;color:var(--c);letter-spacing:3px;text-transform:uppercase;}
.nav-back{display:flex;align-items:center;gap:7px;font-size:.78rem;font-weight:600;color:var(--tm);background:transparent;border:1px solid var(--bdr);padding:7px 14px;border-radius:7px;cursor:pointer;text-decoration:none;transition:all .2s;}
.nav-back:hover{color:var(--c);border-color:var(--c);}
[data-theme="light"] #nav{background:rgba(255,255,255,.95);}

/* ── LAYOUT ── */
.lab-layout{display:grid;grid-template-columns:288px 1fr;min-height:calc(100vh - 64px);margin-top:64px;}

/* ── SIDEBAR ── */
.lab-sidebar{background:var(--bg2);border-right:1px solid var(--bdr);position:sticky;top:64px;height:calc(100vh - 64px);overflow-y:auto;display:flex;flex-direction:column;}
.lab-sidebar::-webkit-scrollbar{width:3px;}
.lab-sidebar::-webkit-scrollbar-thumb{background:var(--c3);}
.sb-header{padding:1.2rem 1rem .8rem;border-bottom:1px solid var(--bdr);}
.sb-course-title{font-family:'Orbitron',monospace;font-size:.68rem;font-weight:700;color:var(--c);letter-spacing:2px;text-transform:uppercase;margin-bottom:.4rem;}
.sb-progress-wrap{display:flex;align-items:center;gap:.6rem;}
.sb-progress-bar{flex:1;height:3px;background:var(--bg4);border-radius:3px;overflow:hidden;}
.sb-progress-fill{height:100%;background:linear-gradient(90deg,var(--c),var(--g));border-radius:3px;transition:width .4s ease;}
.sb-progress-pct{font-family:'Orbitron',monospace;font-size:.6rem;font-weight:700;color:var(--c);white-space:nowrap;}
.sb-cats{padding:.8rem 0;}
.sb-cat-label{font-size:.58rem;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:2px;padding:.3rem 1rem;margin-top:.4rem;}
.sb-lab-item{display:flex;align-items:center;gap:.7rem;padding:.55rem 1rem;cursor:pointer;transition:background .15s,color .15s;border-left:2px solid transparent;position:relative;}
.sb-lab-item:hover{background:rgba(0,212,255,.05);color:var(--tw);}
.sb-lab-item.active{background:rgba(0,212,255,.08);border-left-color:var(--c);color:var(--tw);}
.sb-lab-item.completed .sb-dot{background:var(--g);box-shadow:0 0 6px rgba(0,255,136,.4);}
.sb-dot{width:8px;height:8px;border-radius:50%;background:var(--bg4);border:1.5px solid var(--bdr2);flex-shrink:0;transition:all .2s;}
.sb-lab-item.active .sb-dot{background:var(--c);box-shadow:0 0 6px rgba(0,212,255,.5);border-color:var(--c);}
.sb-lab-num{font-family:'Orbitron',monospace;font-size:.58rem;font-weight:700;color:var(--tm);flex-shrink:0;width:26px;}
.sb-lab-title{font-size:.75rem;color:inherit;line-height:1.35;flex:1;}
.sb-lab-badge{font-size:.52rem;font-weight:700;padding:2px 6px;border-radius:3px;background:rgba(0,212,255,.1);color:var(--c);letter-spacing:.5px;flex-shrink:0;}
.sb-lab-badge.adv{background:rgba(255,106,0,.1);color:var(--o);}
.sb-lab-badge.sec{background:rgba(0,255,136,.1);color:var(--g);}

/* ── MAIN CONTENT ── */
.lab-main{background:var(--bg1);padding:2.5rem;overflow-y:auto;}
.lab-main-inner{max-width:860px;margin:0 auto;}

/* ── LAB HEADER ── */
.lab-header{margin-bottom:2rem;}
.lab-breadcrumb{display:flex;align-items:center;gap:.5rem;font-size:.7rem;color:var(--tm);margin-bottom:.8rem;}
.lab-breadcrumb span{color:var(--c);cursor:pointer;}
.lab-num-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.25);border-radius:5px;padding:4px 12px;font-family:'Orbitron',monospace;font-size:.6rem;font-weight:700;color:var(--c);letter-spacing:2px;margin-bottom:.8rem;}
.lab-title{font-family:'Orbitron',monospace;font-size:clamp(1.2rem,2.5vw,1.8rem);font-weight:900;color:var(--tw);line-height:1.2;margin-bottom:.8rem;}
.lab-meta{display:flex;gap:1.2rem;flex-wrap:wrap;margin-bottom:1.2rem;}
.lab-meta-item{display:flex;align-items:center;gap:5px;font-size:.76rem;color:var(--tm);}
.lab-meta-item i{color:var(--c);font-size:.7rem;}
.lab-objective{background:var(--bg3);border:1px solid var(--bdr);border-left:3px solid var(--c);border-radius:var(--r);padding:1rem 1.2rem;font-size:.88rem;color:var(--t);line-height:1.75;}

/* ── SECTION HEADERS ── */
.lab-section{margin-bottom:2rem;}
.lab-sec-title{display:flex;align-items:center;gap:.75rem;font-family:'Orbitron',monospace;font-size:.72rem;font-weight:700;color:var(--tw);text-transform:uppercase;letter-spacing:2px;margin-bottom:1rem;padding-bottom:.6rem;border-bottom:1px solid var(--bdr);}
.lab-sec-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.78rem;flex-shrink:0;}
.lsi-topo{background:rgba(0,212,255,.1);color:var(--c);}
.lsi-task{background:rgba(255,106,0,.1);color:var(--o);}
.lsi-config{background:rgba(0,212,255,.08);color:var(--c);}
.lsi-verify{background:rgba(0,255,136,.1);color:var(--g);}
.lsi-notes{background:rgba(255,215,0,.1);color:#ffd700;}

/* ── TOPOLOGY SVG ── */
.topo-wrap{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r2);padding:1.5rem;overflow:hidden;}
.topo-svg{width:100%;height:auto;max-height:260px;}
.topo-device rect,.topo-device path{fill:rgba(0,212,255,.06);stroke:rgba(0,212,255,.4);stroke-width:1.5;}
.topo-label{font-family:'Orbitron',monospace;fill:#00d4ff;font-weight:700;}
.topo-sublabel{font-family:'Exo 2',sans-serif;fill:#7a9ab5;font-size:9px;}
.topo-link{stroke:rgba(0,212,255,.5);stroke-width:1.8;}
.topo-link-label{font-family:'Exo 2',sans-serif;fill:#7a9ab5;font-size:9px;}
.topo-port{font-family:'JetBrains Mono',monospace;fill:#7a9ab5;font-size:8px;}
.topo-link-badge rect{fill:rgba(0,212,255,.08);stroke:rgba(0,212,255,.2);stroke-width:1;}
.topo-link-badge text{fill:#00d4ff;}
[data-theme="light"] .topo-wrap{background:#f8fafc;}
[data-theme="light"] .topo-device rect{fill:rgba(0,98,204,.06);stroke:rgba(0,98,204,.3);}
[data-theme="light"] .topo-label{fill:#0062cc;}
[data-theme="light"] .topo-link{stroke:rgba(0,98,204,.4);}

/* ── TASK LIST ── */
.task-list{display:flex;flex-direction:column;gap:.55rem;}
.task-item{display:flex;align-items:flex-start;gap:.75rem;padding:.75rem 1rem;background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);transition:border-color .2s;}
.task-item:hover{border-color:var(--bdr2);}
.task-num{font-family:'Orbitron',monospace;font-size:.6rem;font-weight:700;color:var(--c);background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.2);border-radius:5px;padding:3px 8px;flex-shrink:0;letter-spacing:1px;}
.task-text{font-size:.84rem;color:var(--t);line-height:1.6;}

/* ── CONFIG DEVICE TABS ── */
.config-tabs{display:flex;gap:.4rem;margin-bottom:.8rem;flex-wrap:wrap;}
.config-tab{font-family:'Orbitron',monospace;font-size:.6rem;font-weight:700;padding:5px 14px;border-radius:6px;border:1px solid var(--bdr2);color:var(--tm);background:transparent;cursor:pointer;transition:all .15s;letter-spacing:1px;}
.config-tab.active{background:rgba(0,212,255,.1);color:var(--c);border-color:var(--c);}
.config-tab:hover:not(.active){border-color:var(--bdr2);color:var(--t);}
.config-pane{display:none;}
.config-pane.active{display:block;}

/* ── CLI CODE BLOCK ── */
.cli-block{background:#010810;border:1px solid rgba(0,212,255,.15);border-radius:var(--r);overflow:hidden;}
.cli-bar{background:#071525;padding:.55rem 1rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(0,212,255,.1);}
.cli-bar-title{font-family:'Orbitron',monospace;font-size:.58rem;font-weight:700;color:var(--c);letter-spacing:2px;}
.cli-copy{background:none;border:1px solid rgba(0,212,255,.2);color:var(--tm);padding:3px 10px;border-radius:5px;font-family:'Exo 2',sans-serif;font-size:.62rem;cursor:pointer;transition:all .15s;}
.cli-copy:hover{color:var(--c);border-color:var(--c);}
.cli-body{padding:1rem 1.2rem;font-family:'JetBrains Mono','Courier New',monospace;font-size:.78rem;line-height:1.85;overflow-x:auto;}
.cli-prompt{color:#00d4ff;}
.cli-cmd{color:#c8ddf0;}
.cli-comment{color:#3a5a78;font-style:italic;}
.cli-output{color:#7a9ab5;}
.cli-success{color:#00ff88;}
.cli-section{color:#ff9a40;font-weight:600;}

/* ── VERIFICATION TABLE ── */
.verify-list{display:flex;flex-direction:column;gap:.6rem;}
.verify-item{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;}
.verify-cmd{padding:.7rem 1rem;background:var(--bg3);border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:.6rem;}
.verify-cmd-text{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--c);flex:1;}
.verify-expected{padding:.6rem 1rem;font-size:.79rem;color:var(--tm);line-height:1.5;}
.verify-expected strong{color:var(--tw);}

/* ── NOTES ── */
.notes-list{display:flex;flex-direction:column;gap:.5rem;}
.note-item{display:flex;align-items:flex-start;gap:.65rem;padding:.7rem .9rem;background:rgba(255,215,0,.04);border:1px solid rgba(255,215,0,.12);border-radius:var(--r);}
.note-ico{color:#ffd700;font-size:.75rem;flex-shrink:0;margin-top:2px;}
.note-text{font-size:.82rem;color:var(--t);line-height:1.6;}
.note-text strong{color:var(--tw);}

/* ── LAB NAV (prev / next) ── */
.lab-nav{display:flex;justify-content:space-between;align-items:center;margin-top:3rem;padding-top:1.5rem;border-top:1px solid var(--bdr);gap:1rem;flex-wrap:wrap;}
.lab-nav-btn{display:flex;align-items:center;gap:.6rem;padding:.75rem 1.2rem;background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);cursor:pointer;transition:all .22s;text-decoration:none;font-size:.78rem;color:var(--tm);}
.lab-nav-btn:hover{border-color:var(--c);color:var(--c);transform:translateY(-2px);}
.lab-nav-btn.next{background:rgba(0,212,255,.06);border-color:rgba(0,212,255,.3);color:var(--c);}
.lab-nav-btn.next:hover{background:rgba(0,212,255,.12);box-shadow:0 6px 20px rgba(0,212,255,.15);}
.lnb-label{font-family:'Orbitron',monospace;font-size:.6rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:2px;}
.lnb-title{font-size:.8rem;font-weight:600;}

/* ── EMPTY STATE ── */
.lab-coming-soon{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;text-align:center;gap:1rem;}
.lcs-icon{width:56px;height:56px;border-radius:14px;background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.2);display:flex;align-items:center;justify-content:center;font-size:1.4rem;}
.lcs-title{font-family:'Orbitron',monospace;font-size:.9rem;font-weight:700;color:var(--tw);}
.lcs-sub{font-size:.82rem;color:var(--tm);max-width:360px;line-height:1.65;}
.lcs-btn{display:inline-flex;align-items:center;gap:7px;padding:10px 22px;background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.3);border-radius:8px;color:var(--c);font-family:'Exo 2',sans-serif;font-size:.8rem;font-weight:700;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:all .2s;letter-spacing:.5px;}
.lcs-btn:hover{background:rgba(0,212,255,.15);transform:translateY(-1px);}

/* ── ANIMATIONS ── */
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.lab-main-inner{animation:fadeSlideIn .3s ease;}

/* ── RESPONSIVE ── */
@media(max-width:1000px){.lab-layout{grid-template-columns:1fr;}.lab-sidebar{position:static;height:auto;max-height:320px;}}
@media(max-width:600px){.lab-main{padding:1.5rem 1rem;}.config-tabs{gap:.3rem;}}
</style>
</head>

<div class="lab-layout">

  <!-- ══ SIDEBAR ══ -->
  <aside class="lab-sidebar">
    <div class="sb-header">
      <div class="sb-course-title">CCNA Exam Labs</div>
      <div class="sb-progress-wrap">
        <div class="sb-progress-bar"><div class="sb-progress-fill" id="sb-prog-fill" style="width:0%"></div></div>
        <div class="sb-progress-pct" id="sb-prog-pct">0 / 18</div>
      </div>
    </div>
    <div class="sb-cats" id="sb-lab-list"></div>
  </aside>

  <!-- ══ MAIN ══ -->
  <main class="lab-main">
    <div class="lab-main-inner" id="lab-content">
      <!-- rendered by JS -->
    </div>
  </main>

</div>

<script>
/* ════════════════════════════════════════
   LAB DATA
   ════════════════════════════════════════ */
const LABS = [

  /* ─── LAYER 2 SWITCHING ─── */
  {
    id:1, cat:'Layer 2 Switching', difficulty:'Intermediate', duration:'25 min',
    title:'802.1Q Trunking & LACP EtherChannel',
    objective:'Configure IEEE 802.1Q trunk encapsulation on inter-switch links and bundle them into a Port-Channel using LACP (Link Aggregation Control Protocol), providing redundancy and increased bandwidth.',
    topology:{type:'l2-trunk',sw:['SW1','SW2'],links:[{ports:'Fa0/1 & Fa0/2',label:'Po10 — LACP',type:'trunk'}]},
    tasks:[
      'Set trunk encapsulation to dot1q on Fa0/1 and Fa0/2 on both switches',
      'Set interface mode to trunk on both member interfaces',
      'Bundle Fa0/1 and Fa0/2 into Port-channel 10 using LACP mode active',
      'Apply the same trunk configuration to the Port-channel interface',
      'Verify the EtherChannel bundle is up (SU) and both ports are bundled (P)'
    ],
    configs:{
      SW1:[
        {t:'s', v:'interface range Fa0/1-2'},
        {t:'c', v:' switchport trunk encapsulation dot1q'},
        {t:'c', v:' switchport mode trunk'},
        {t:'c', v:' channel-group 10 mode active'},
        {t:'s', v:'interface Port-channel 10'},
        {t:'c', v:' switchport trunk encapsulation dot1q'},
        {t:'c', v:' switchport mode trunk'},
      ],
      SW2:[
        {t:'s', v:'interface range Fa0/1-2'},
        {t:'c', v:' switchport trunk encapsulation dot1q'},
        {t:'c', v:' switchport mode trunk'},
        {t:'c', v:' channel-group 10 mode active'},
        {t:'s', v:'interface Port-channel 10'},
        {t:'c', v:' switchport trunk encapsulation dot1q'},
        {t:'c', v:' switchport mode trunk'},
      ]
    },
    verify:[
      {cmd:'show interfaces trunk', expect:'Port-channel10 listed with mode "on" and allowed VLANs 1-4094'},
      {cmd:'show etherchannel summary', expect:'Po10(SU) LACP — Fa0/1(P) Fa0/2(P) — both ports show P (bundled)'},
      {cmd:'show interfaces Port-channel 10', expect:'Line protocol is up, BW doubled vs single link'}
    ],
    notes:[
      '<strong>Encapsulation before mode:</strong> On Layer 3-capable switches you MUST set trunk encapsulation before setting mode trunk — otherwise the command is rejected.',
      '<strong>LACP active vs passive:</strong> Active ports initiate LACP negotiation. For a bundle to form, at least one side must be active. Passive-passive will NOT form a bundle.',
      '<strong>Speed/Duplex matching:</strong> All member interfaces must have identical speed, duplex, and VLAN configuration. A mismatch prevents the bundle from forming.',
      '<strong>Port-channel config:</strong> Configure the Port-channel interface explicitly — it inherits member settings but explicit config prevents unexpected resets.'
    ]
  },

  {
    id:2, cat:'Layer 2 Switching', difficulty:'Intermediate', duration:'25 min',
    title:'802.1Q Trunking & LACP — Native VLAN',
    objective:'Extend trunk configuration with a custom native VLAN (VLAN 45) and bundle links using LACP channel-group 15. Understanding native VLAN is critical for preventing VLAN hopping attacks.',
    topology:{type:'l2-trunk',sw:['SW1','SW2'],links:[{ports:'Fa0/3 & Fa0/4',label:'Po15 — LACP',type:'trunk'}]},
    tasks:[
      'Configure trunk with dot1q encapsulation on Fa0/3 and Fa0/4',
      'Set native VLAN to 45 on both trunk interfaces',
      'Bundle ports into channel-group 15 using LACP mode passive',
      'Verify native VLAN mismatch warnings do NOT appear',
      'Confirm native VLAN 45 shows in show interfaces trunk output'
    ],
    configs:{
      SW1:[
        {t:'s', v:'vlan 45'},
        {t:'c', v:' name NATIVE'},
        {t:'s', v:'interface range Fa0/3-4'},
        {t:'c', v:' switchport trunk encapsulation dot1q'},
        {t:'c', v:' switchport trunk native vlan 45'},
        {t:'c', v:' switchport mode trunk'},
        {t:'c', v:' channel-group 15 mode passive'},
      ],
      SW2:[
        {t:'s', v:'vlan 45'},
        {t:'c', v:' name NATIVE'},
        {t:'s', v:'interface range Fa0/3-4'},
        {t:'c', v:' switchport trunk encapsulation dot1q'},
        {t:'c', v:' switchport trunk native vlan 45'},
        {t:'c', v:' switchport mode trunk'},
        {t:'c', v:' channel-group 15 mode passive'},
      ]
    },
    verify:[
      {cmd:'show interfaces trunk', expect:'Native VLAN column shows 45 for Port-channel15'},
      {cmd:'show etherchannel summary', expect:'Po15(SU) LACP — both ports bundled'},
      {cmd:'show spanning-tree vlan 45', expect:'VLAN45 shows as root or non-root with Po15 as designated port'}
    ],
    notes:[
      '<strong>Native VLAN:</strong> Frames on the native VLAN traverse the trunk untagged. Both ends MUST match — a mismatch generates CDP warnings and may cause traffic leakage.',
      '<strong>LACP passive:</strong> Both sides passive will NOT negotiate. In this lab, if the partner is also passive, use active on one side.',
      '<strong>Security best practice:</strong> Change native VLAN away from VLAN 1 (default) to reduce VLAN hopping attack surface.'
    ]
  },

  {
    id:3, cat:'Layer 2 Switching', difficulty:'Intermediate', duration:'30 min',
    title:'Voice VLAN & LLDP',
    objective:'Configure a data VLAN (77) and voice VLAN (177) on access ports to support IP phones, and enable LLDP for vendor-neutral neighbor discovery.',
    topology:{type:'voice',sw:['SW1'],devices:['PC1','IP Phone'],links:[]},
    tasks:[
      'Create VLAN 77 (DATA) and VLAN 177 (VOICE) on SW1',
      'Configure Fa0/10 as access port for data VLAN 77',
      'Add voice VLAN 177 to the same interface (Fa0/10)',
      'Enable LLDP globally and verify neighbor discovery',
      'Verify QoS trust state is correct for voice traffic'
    ],
    configs:{
      SW1:[
        {t:'s', v:'vlan 77'},
        {t:'c', v:' name DATA'},
        {t:'s', v:'vlan 177'},
        {t:'c', v:' name VOICE'},
        {t:'s', v:'interface Fa0/10'},
        {t:'c', v:' switchport mode access'},
        {t:'c', v:' switchport access vlan 77'},
        {t:'c', v:' switchport voice vlan 177'},
        {t:'c', v:' mls qos trust cos'},
        {t:'s', v:'lldp run'},
      ]
    },
    verify:[
      {cmd:'show vlan brief', expect:'VLAN 77 and VLAN 177 both show Active'},

let currentLab = 1;
let completedLabs = new Set(JSON.parse(localStorage.getItem('ccna_labs_done')||'[]'));

function renderSidebar() {
  const cats = {};
  LABS.forEach(l => { if (!cats[l.cat]) cats[l.cat] = []; cats[l.cat].push(l); });
  let html = '';
  Object.entries(cats).forEach(([cat, labs]) => {
    html += `<div class="sb-cat-label">${cat}</div>`;
    labs.forEach(l => {
      const done = completedLabs.has(l.id);
      const active = l.id === currentLab;
      const badge = l.cat === 'Security & Services' ? 'sec' : l.difficulty === 'Advanced' ? 'adv' : '';
      html += `<div class="sb-lab-item${active?' active':''}${done?' completed':''}" onclick="loadLab(${l.id})">
        <div class="sb-dot"></div>
        <div class="sb-lab-num">L${String(l.id).padStart(2,'0')}</div>
        <div class="sb-lab-title">${l.title}</div>
        ${badge ? `<div class="sb-lab-badge ${badge}">${badge==='sec'?'SEC':'ADV'}</div>` : ''}
      </div>`;
    });
  });
  document.getElementById('sb-lab-list').innerHTML = html;
  const pct = Math.round(completedLabs.size / LABS.length * 100);
  document.getElementById('sb-prog-fill').style.width = pct + '%';
  document.getElementById('sb-prog-pct').textContent = `${completedLabs.size} / ${LABS.length}`;
}

function renderLab(id) {
  const lab = LABS.find(l => l.id === id);
  if (!lab) return;
  currentLab = id;
  const prevLab = LABS.find(l => l.id === id - 1);
  const nextLab = LABS.find(l => l.id === id + 1);
  const isFullyRendered = lab.tasks && lab.configs && lab.verify && lab.notes;

  let html = `
    <div class="lab-header">
      <div class="lab-breadcrumb">
        <span onclick="history.back()">CCNA Labs</span>
        <i class="fas fa-chevron-right" style="font-size:.5rem"></i>
        <span style="color:var(--tm)">${lab.cat}</span>
      </div>
      <div class="lab-num-badge"><i class="fas fa-flask"></i> LAB ${String(lab.id).padStart(2,'0')}</div>
      <h1 class="lab-title">${lab.title}</h1>
      <div class="lab-meta">
        <div class="lab-meta-item"><i class="fas fa-layer-group"></i>${lab.cat}</div>
        <div class="lab-meta-item"><i class="fas fa-signal"></i>${lab.difficulty}</div>
        <div class="lab-meta-item"><i class="fas fa-clock"></i>${lab.duration}</div>
        <div class="lab-meta-item"><i class="fas fa-file-alt"></i>Packet Tracer .pkt</div>
      </div>
      <div class="lab-objective">${lab.objective}</div>
    </div>`;

  if (isFullyRendered) {
    /* ── TOPOLOGY ── */
    html += `<div class="lab-section">
      <div class="lab-sec-title"><div class="lab-sec-icon lsi-topo"><i class="fas fa-project-diagram"></i></div>Network Topology</div>
      <div class="topo-wrap">${renderTopology(lab)}</div>
    </div>`;

    /* ── TASKS ── */
    html += `<div class="lab-section">
      <div class="lab-sec-title"><div class="lab-sec-icon lsi-task"><i class="fas fa-tasks"></i></div>Lab Tasks</div>
      <div class="task-list">
        ${lab.tasks.map((t,i)=>`<div class="task-item">
          <div class="task-num">TASK ${i+1}</div>
          <div class="task-text">${t}</div>
        </div>`).join('')}
      </div>
    </div>`;

    /* ── CONFIGURATION ── */
    const devices = Object.keys(lab.configs);
    html += `<div class="lab-section">
      <div class="lab-sec-title"><div class="lab-sec-icon lsi-config"><i class="fas fa-terminal"></i></div>Step-by-Step Configuration</div>
      <div class="config-tabs">
        ${devices.map((d,i)=>`<button class="config-tab${i===0?' active':''}" onclick="switchTab(this,'cfg-${lab.id}-${d}')">${d}</button>`).join('')}
      </div>
      ${devices.map((d,i)=>`<div class="config-pane${i===0?' active':''}" id="cfg-${lab.id}-${d}">
        <div class="cli-block">
          <div class="cli-bar">
            <div class="cli-bar-title">${d}# — CONFIGURATION</div>
            <button class="cli-copy" onclick="copyConfig('cfg-code-${lab.id}-${d}')"><i class="fas fa-copy"></i> Copy</button>
          </div>
          <div class="cli-body" id="cfg-code-${lab.id}-${d}">
            ${renderCLI(d, lab.configs[d])}
          </div>
        </div>
      </div>`).join('')}
    </div>`;

    /* ── VERIFICATION ── */
    html += `<div class="lab-section">
      <div class="lab-sec-title"><div class="lab-sec-icon lsi-verify"><i class="fas fa-check-double"></i></div>Verification Commands</div>
      <div class="verify-list">
        ${lab.verify.map(v=>`<div class="verify-item">
          <div class="verify-cmd">
            <i class="fas fa-terminal" style="color:var(--c);font-size:.75rem;flex-shrink:0"></i>
            <div class="verify-cmd-text">${v.cmd}</div>
          </div>
          <div class="verify-expected"><i class="fas fa-arrow-right" style="color:var(--g);margin-right:6px;font-size:.7rem"></i>${v.expect}</div>
        </div>`).join('')}
      </div>
    </div>`;

    /* ── NOTES ── */
    html += `<div class="lab-section">
      <div class="lab-sec-title"><div class="lab-sec-icon lsi-notes"><i class="fas fa-lightbulb"></i></div>Key Notes & Tips</div>
      <div class="notes-list">
        ${lab.notes.map(n=>`<div class="note-item">
          <i class="fas fa-circle-info note-ico"></i>
          <div class="note-text">${n}</div>
        </div>`).join('')}
      </div>
    </div>`;

    /* ── COMPLETE BUTTON ── */
    const done = completedLabs.has(lab.id);
    html += `<div style="text-align:center;margin:1.5rem 0;">
      <button id="mark-done-btn" onclick="markComplete(${lab.id})" style="display:inline-flex;align-items:center;gap:8px;padding:10px 24px;background:${done?'rgba(0,255,136,.1)':'rgba(0,212,255,.08)'};border:1px solid ${done?'rgba(0,255,136,.35)':'rgba(0,212,255,.3)'};border-radius:8px;color:${done?'var(--g)':'var(--c)'};font-family:'Exo 2',sans-serif;font-size:.82rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:all .2s;">
        <i class="fas ${done?'fa-check-circle':'fa-circle'}"></i>${done?'Lab Completed':'Mark as Complete'}
      </button>
    </div>`;

  } else {
    html += `<div class="lab-coming-soon">
      <div class="lcs-icon"><i class="fas fa-flask" style="color:var(--c)"></i></div>
      <div class="lcs-title">Lab Content Coming Soon</div>
      <div class="lcs-sub">This lab's detailed walkthrough is being prepared. Download the Packet Tracer file to practice now.</div>
      <a href="#" class="lcs-btn" onclick="return false"><i class="fas fa-download"></i> Download .pkt File</a>
    </div>`;
  }

  /* ── NAV BUTTONS ── */
  html += `<div class="lab-nav">
    ${prevLab ? `<button class="lab-nav-btn" onclick="loadLab(${prevLab.id})">
      <i class="fas fa-arrow-left"></i>
      <div><span class="lnb-label">Previous</span><span class="lnb-title">Lab ${prevLab.id}: ${prevLab.title.substring(0,32)}${prevLab.title.length>32?'…':''}</span></div>
    </button>` : '<div></div>'}
    ${nextLab ? `<button class="lab-nav-btn next" onclick="loadLab(${nextLab.id})">
      <div style="text-align:right"><span class="lnb-label">Next Lab</span><span class="lnb-title">Lab ${nextLab.id}: ${nextLab.title.substring(0,32)}${nextLab.title.length>32?'…':''}</span></div>
      <i class="fas fa-arrow-right"></i>
    </button>` : '<div></div>'}
  </div>`;

  const el = document.getElementById('lab-content');
  el.style.animation = 'none';
  el.offsetHeight; /* reflow */
  el.style.animation = '';
  el.innerHTML = html;
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderCLI(device, lines) {
  return lines.map(l => {
    if (l.t === 'n') return `<div class="cli-comment">${l.v}</div>`;
    if (l.t === 's') return `<div><span class="cli-prompt">${device}(config)# </span><span class="cli-cmd">${l.v}</span></div>`;
    return `<div><span class="cli-prompt">${device}(config-if)# </span><span class="cli-cmd">${l.v}</span></div>`;
  }).join('');
}

function switchTab(btn, paneId) {
  btn.closest('.lab-section').querySelectorAll('.config-tab').forEach(b=>b.classList.remove('active'));
  btn.closest('.lab-section').querySelectorAll('.config-pane').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(paneId).classList.add('active');
}

function copyConfig(id) {
  const el = document.getElementById(id);
  const text = el.innerText || el.textContent;
  navigator.clipboard.writeText(text).then(()=>{
    const btn = el.closest('.cli-block').querySelector('.cli-copy');
    btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
    btn.style.color = 'var(--g)';
    setTimeout(()=>{ btn.innerHTML='<i class="fas fa-copy"></i> Copy'; btn.style.color=''; }, 2000);
  });
}

function markComplete(id) {
  if (completedLabs.has(id)) { completedLabs.delete(id); }
  else { completedLabs.add(id); }
  localStorage.setItem('ccna_labs_done', JSON.stringify([...completedLabs]));
  renderSidebar();
  const btn = document.getElementById('mark-done-btn');
  if (btn) {
    const done = completedLabs.has(id);
    btn.innerHTML = `<i class="fas ${done?'fa-check-circle':'fa-circle'}"></i>${done?'Lab Completed':'Mark as Complete'}`;
    btn.style.background = done ? 'rgba(0,255,136,.1)' : 'rgba(0,212,255,.08)';
    btn.style.borderColor = done ? 'rgba(0,255,136,.35)' : 'rgba(0,212,255,.3)';
    btn.style.color = done ? 'var(--g)' : 'var(--c)';
  }
}

function loadLab(id) {
  currentLab = id;
  renderSidebar();
  renderLab(id);
}

/* ── INIT ── */
renderSidebar();
renderLab(1);
</script>

</body>
</html>
